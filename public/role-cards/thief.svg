<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" role="img" aria-label="도둑 카드">
  <defs>
    <linearGradient id="bgThief" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1e08"/>
      <stop offset="1" stop-color="#0a0705"/>
    </linearGradient>
    <linearGradient id="amberThief" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92610a"/>
    </linearGradient>
    <radialGradient id="glowThief" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="6" y="6" width="288" height="408" rx="22" fill="url(#bgThief)" stroke="url(#amberThief)" stroke-width="3"/>
  <ellipse cx="150" cy="185" rx="120" ry="120" fill="url(#glowThief)"/>

  <!-- 복면 도둑 엠블럼 -->
  <g transform="translate(150 175)">
    <!-- 두건 -->
    <path d="M-64 6 Q-64 -60 0 -60 Q64 -60 64 6 Q64 20 50 24 Q0 6 -50 24 Q-64 20 -64 6 Z" fill="#161009" stroke="url(#amberThief)" stroke-width="3"/>
    <!-- 눈가리개 밴드 -->
    <rect x="-58" y="-18" width="116" height="30" rx="8" fill="url(#amberThief)"/>
    <ellipse cx="-24" cy="-3" rx="12" ry="9" fill="#0a0705"/>
    <ellipse cx="24" cy="-3" rx="12" ry="9" fill="#0a0705"/>
    <ellipse cx="-24" cy="-3" rx="4" ry="4" fill="#fff" fill-opacity="0.9"/>
    <ellipse cx="24" cy="-3" rx="4" ry="4" fill="#fff" fill-opacity="0.9"/>
    <!-- 돈자루 -->
    <path d="M-30 44 Q-40 92 0 98 Q40 92 30 44 Q16 54 0 54 Q-16 54 -30 44 Z" fill="url(#amberThief)"/>
    <text x="0" y="86" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="900" fill="#0a0705">₩</text>
  </g>

  <text x="150" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="900" letter-spacing="2" fill="url(#amberThief)">도둑</text>
  <text x="150" y="362" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#fcd34d" fill-opacity="0.8">THIEF</text>
  <text x="150" y="392" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.55">지갑의 10%를 50%로 훔친다</text>
</svg>
