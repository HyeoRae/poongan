<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" role="img" aria-label="해커 카드">
  <defs>
    <linearGradient id="bgHack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06222a"/>
      <stop offset="1" stop-color="#04080a"/>
    </linearGradient>
    <linearGradient id="cyanHack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="glowHack" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="6" y="6" width="288" height="408" rx="22" fill="url(#bgHack)" stroke="url(#cyanHack)" stroke-width="3"/>
  <ellipse cx="150" cy="185" rx="120" ry="120" fill="url(#glowHack)"/>

  <!-- 터미널/모니터 엠블럼 -->
  <g transform="translate(150 178)">
    <rect x="-78" y="-58" width="156" height="108" rx="12" fill="#03141a" stroke="url(#cyanHack)" stroke-width="3"/>
    <rect x="-78" y="-58" width="156" height="24" rx="12" fill="url(#cyanHack)" fill-opacity="0.15"/>
    <circle cx="-62" cy="-46" r="4" fill="#22d3ee"/>
    <circle cx="-48" cy="-46" r="4" fill="#22d3ee" fill-opacity="0.6"/>
    <circle cx="-34" cy="-46" r="4" fill="#22d3ee" fill-opacity="0.35"/>
    <text x="0" y="18" text-anchor="middle" font-family="'Consolas', monospace" font-size="46" font-weight="900" fill="url(#cyanHack)">&lt;/&gt;</text>
    <rect x="-24" y="52" width="48" height="10" rx="3" fill="url(#cyanHack)"/>
    <rect x="-40" y="66" width="80" height="8" rx="4" fill="#0e7490"/>
  </g>

  <text x="150" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="900" letter-spacing="2" fill="url(#cyanHack)">해커</text>
  <text x="150" y="362" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#67e8f9" fill-opacity="0.8">HACKER</text>
  <text x="150" y="392" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.55">전원의 지갑을 훔쳐본다</text>
</svg>
