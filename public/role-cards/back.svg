<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" role="img" aria-label="역할 카드 뒷면">
  <defs>
    <linearGradient id="bgBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13131c"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <linearGradient id="goldBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.5" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <pattern id="lattice" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 14 H28 M14 0 V28" stroke="#f5c542" stroke-opacity="0.10" stroke-width="1.5"/>
    </pattern>
  </defs>

  <rect x="6" y="6" width="288" height="408" rx="22" fill="url(#bgBack)" stroke="url(#goldBack)" stroke-width="3"/>
  <rect x="20" y="20" width="260" height="380" rx="14" fill="url(#lattice)" stroke="#f5c542" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- 중앙 엠블럼 -->
  <circle cx="150" cy="210" r="74" fill="none" stroke="url(#goldBack)" stroke-width="3"/>
  <circle cx="150" cy="210" r="60" fill="#0d0d14" stroke="#f5c542" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="150" y="238" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="url(#goldBack)">?</text>

  <!-- 모서리 장식 -->
  <g fill="url(#goldBack)">
    <circle cx="40" cy="40" r="4"/>
    <circle cx="260" cy="40" r="4"/>
    <circle cx="40" cy="380" r="4"/>
    <circle cx="260" cy="380" r="4"/>
  </g>

  <text x="150" y="350" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="6" fill="#f5c542" fill-opacity="0.85">ROLE</text>
</svg>
