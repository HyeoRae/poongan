<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" role="img" aria-label="충성 팀원 카드">
  <defs>
    <linearGradient id="bgMem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15140d"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <linearGradient id="goldMem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.5" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="glowMem" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#f5c542" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f5c542" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="6" y="6" width="288" height="408" rx="22" fill="url(#bgMem)" stroke="url(#goldMem)" stroke-width="3"/>
  <ellipse cx="150" cy="185" rx="120" ry="120" fill="url(#glowMem)"/>

  <!-- 방패 엠블럼 -->
  <g transform="translate(150 180)">
    <path d="M0 -74 L62 -50 L62 6 Q62 56 0 84 Q-62 56 -62 6 L-62 -50 Z" fill="#0d0d14" stroke="url(#goldMem)" stroke-width="4"/>
    <path d="M0 -58 L48 -39 L48 4 Q48 44 0 66 Q-48 44 -48 4 L-48 -39 Z" fill="none" stroke="#f5c542" stroke-opacity="0.4" stroke-width="2"/>
    <!-- 체크/충성 표식 -->
    <path d="M-22 2 L-6 20 L26 -22" fill="none" stroke="url(#goldMem)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="150" y="320" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="900" letter-spacing="2" fill="url(#goldMem)">충성 팀원</text>
  <text x="150" y="356" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#f5c542" fill-opacity="0.8">LOYAL</text>
  <text x="150" y="388" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.55">우리 팀의 스파이를 색출하라</text>
</svg>
