<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#0b0b12" />
    <title>오프라인 · 풍계모 여행</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100dvh;
        background: #0b0b12;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Malgun Gothic", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }
      .badge {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        background: #f5c542;
        color: #0b0b12;
        font-size: 52px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 { font-size: 20px; margin: 4px 0 0; }
      p { font-size: 14px; color: #9a9aa6; margin: 0; line-height: 1.6; }
      button {
        margin-top: 8px;
        border: none;
        border-radius: 12px;
        background: #f5c542;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        padding: 11px 28px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">풍</div>
      <h1>오프라인이에요</h1>
      <p>네트워크 연결이 끊겼습니다.<br />신호가 약한 곳이라면 잠시 후 다시 시도해 주세요.</p>
      <button onclick="location.reload()">다시 불러오기</button>
    </div>
  </body>
</html>
