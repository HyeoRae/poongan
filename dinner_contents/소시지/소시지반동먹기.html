<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <title>소시지 반동 먹기</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1c1c1f;
      --border: #2a2a2e;
      --border-strong: #3a3a40;
      --text: #f5f5f6;
      --muted: #8a8a92;
      --muted-2: #6a6a72;
      --white: #f5f5f6;
      --warn: #ff6b5e;
      --accent: #ff9b6b;
      --radius: 20px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100dvh;
      display: flex; justify-content: center; align-items: stretch;
      -webkit-user-select: none; user-select: none;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(80% 50% at 50% -10%, color-mix(in srgb, var(--accent) 14%, #1a1a1d) 0%, transparent 60%);
    }
    .app {
      position: relative; width: 100%; max-width: 720px; min-height: 100dvh;
      padding: clamp(28px, 5vh, 56px) clamp(20px, 5vw, 48px) clamp(24px, 4vh, 40px);
      display: flex; flex-direction: column;
      animation: fade .35s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .eyebrow { font-size: 13px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; font-weight: 700; }
    h1 { font-size: clamp(34px, 7vw, 56px); margin: 8px 0 12px; letter-spacing: -1.5px; font-weight: 800; display: flex; align-items: center; gap: 14px; }
    h1 .emoji { font-size: .9em; }
    .sub { color: var(--muted); font-size: clamp(15px, 1.8vw, 18px); line-height: 1.6; margin: 0 0 clamp(24px, 4vh, 36px); }

    .section { margin-bottom: clamp(20px, 3vh, 28px); }
    .section-label {
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
      color: var(--muted-2); margin: 0 0 12px 2px;
    }

    /* 준비물 칩 */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      padding: 9px 16px; font-size: 14px; font-weight: 600; color: var(--text);
    }

    /* 방법 단계 */
    .steps { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .steps li {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 15px 16px; font-size: 15px; line-height: 1.55; color: var(--text);
      display: flex; gap: 14px; align-items: baseline;
    }
    .steps li .n {
      flex: 0 0 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
      background: color-mix(in srgb, var(--accent) 20%, var(--surface-2));
      color: var(--accent); font-weight: 800; font-size: 14px; font-variant-numeric: tabular-nums;
      align-self: flex-start; margin-top: 1px;
    }
    .steps li b { color: var(--white); font-weight: 700; }

    /* 룰 (경고 강조) */
    .rules { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
    .rules li {
      background: color-mix(in srgb, var(--warn) 8%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--warn) 30%, var(--border));
      border-radius: 14px; padding: 13px 16px; font-size: 14.5px; line-height: 1.5;
      color: var(--text); display: flex; gap: 12px; align-items: baseline;
    }
    .rules li::before { content: "!"; color: var(--warn); font-weight: 900; flex: 0 0 auto; }
    .rules li b { color: var(--white); }

    .spacer { flex: 1; min-height: 20px; }
    .back {
      display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
      background: transparent; border: 1px solid var(--border); border-radius: 14px;
      color: var(--muted); text-decoration: none; font-size: 15px; font-weight: 600;
      padding: 13px 20px; transition: color .18s ease, border-color .18s ease;
    }
    .back:hover { color: var(--text); border-color: var(--border-strong); }

    .fs-btn {
      position: fixed; top: 14px; right: 14px; z-index: 50;
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      font-size: 19px; line-height: 1; cursor: pointer; display: grid; place-items: center;
      transition: color .18s ease, border-color .18s ease, transform .12s ease;
    }
    .fs-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .fs-btn:active { transform: scale(0.94); }
  </style>
</head>
<body>
  <button id="fsBtn" class="fs-btn" title="전체화면" aria-label="전체화면">⛶</button>
  <div class="app">
    <div class="eyebrow">Dinner Game 1</div>
    <h1><span class="emoji">🌭</span> 소시지 반동 먹기</h1>
    <p class="sub">손 대지 않고 <b>허리 반동</b>만으로 매달린 소시지를 먼저 다 먹는 팀이 승리.</p>

    <div class="section">
      <p class="section-label">준비물</p>
      <div class="chips">
        <span class="chip">끈</span>
        <span class="chip">소시지 (1인 1개)</span>
      </div>
    </div>

    <div class="section">
      <p class="section-label">방법</p>
      <ol class="steps">
        <li><span class="n">1</span><span>끈 한쪽 끝에 소시지를 묶고, 반대쪽을 <b>허리 뒤쪽</b>에 묶는다.</span></li>
        <li><span class="n">2</span><span>소시지가 <b>무릎~허벅지 높이</b>에 매달리게 한다.</span></li>
        <li><span class="n">3</span><span>선 채로 <b>손을 쓰지 않고</b>, 허리 반동만으로 소시지를 흔들어 입으로 문다.</span></li>
        <li><span class="n">4</span><span>먼저 다 먹는 팀이 <b>승리</b>.</span></li>
      </ol>
    </div>

    <div class="section">
      <p class="section-label">룰</p>
      <ul class="rules">
        <li><span><b>손 사용 금지</b> — 오직 허리 반동만.</span></li>
      </ul>
    </div>

    <div class="spacer"></div>
    <a class="back" href="../index.html">← 게임 목록</a>
  </div>

  <script>
    // 전체화면 토글 (지원 브라우저 한정)
    const fsBtn = document.getElementById("fsBtn");
    const docEl = document.documentElement;
    const reqFs = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
    const exitFs = document.exitFullscreen || document.webkitExitFullscreen;
    const isFs = () => document.fullscreenElement || document.webkitFullscreenElement;
    if (!reqFs) { fsBtn.style.display = "none"; }
    else {
      fsBtn.onclick = () => { isFs() ? exitFs.call(document) : reqFs.call(docEl); };
      const sync = () => { fsBtn.textContent = isFs() ? "×" : "⛶"; };
      document.addEventListener("fullscreenchange", sync);
      document.addEventListener("webkitfullscreenchange", sync);
    }
  </script>
</body>
</html>
