<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>줄줄이 말해요 — 기호 맞히기</title>
<style>
  :root { --bg:#0d1117; --fg:#f5f5f5; --dim:#7d8590; --accent:#58a6ff; --warn:#f85149; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:"Segoe UI","Malgun Gothic",sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
    -webkit-user-select:none; user-select:none; cursor:pointer;
  }
  /* 상단 진행바 */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:2vh 3vw; font-size:2.4vh; color:var(--dim);
  }
  #count { font-variant-numeric:tabular-nums; }
  #timerWrap { flex:1; margin:0 3vw; height:1.2vh; background:#21262d; border-radius:1vh; overflow:hidden; display:none; }
  #timerWrap.on { display:block; }
  #timerBar { height:100%; width:100%; background:var(--accent); transition:width .1s linear; }
  #timerBar.timeout { background:var(--warn); }
  /* 중앙 기호 */
  main { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
  #symbol { font-size:38vh; line-height:1; font-weight:600; text-align:center; }
  #symbol img { height:38vh; width:auto; filter:invert(1); }  /* 검은 PNG → 흰색 */
  /* 정답 */
  #answer {
    position:absolute; bottom:6vh; left:0; right:0; text-align:center;
    font-size:5vh; color:var(--accent); opacity:0; transition:opacity .15s;
  }
  #answer.show { opacity:1; }
  /* 하단 안내 */
  footer { padding:2vh 3vw; font-size:1.9vh; color:var(--dim); text-align:center; }
  footer b { color:var(--fg); }
  .timeout-flash { animation:flash .4s; }
  @keyframes flash { 0%,100%{background:var(--bg);} 50%{background:#3d1518;} }
</style>
</head>
<body>
  <header>
    <span id="count">1 / 42</span>
    <div id="timerWrap"><div id="timerBar"></div></div>
    <span id="mode" style="min-width:14vw;text-align:right"></span>
  </header>

  <main>
    <div id="symbol">?</div>
    <div id="answer"></div>
  </main>

  <footer>

// ── 셔플 (Fisher–Yates) ──────────────────────────────────────
let deck = [], pos = 0, timerOn = false, timerId = null, tickTimers = [];
function shuffle() {
  deck = SYMBOLS.map((s, i) => i);
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  pos = 0;
}
function render() {
  const s = SYMBOLS[deck[pos]];
  const el = document.getElementById("symbol");
  el.innerHTML = s.img ? '<img src="' + s.img + '" alt="">' : s.t;
  document.getElementById("count").textContent = (pos + 1) + " / " + deck.length;
  const ans = document.getElementById("answer");
  ans.classList.remove("show");
  ans.textContent = "";   // 정답칸을 비워둠 → 다음 정답이 미리 새어나오지 않음
  if (timerOn) startTimer();
}
function next() {
  pos++;
  if (pos >= deck.length) { shuffle(); }   // 한 바퀴 끝 → 자동 재셔플
  render();
}
function prev() { pos = (pos - 1 + deck.length) % deck.length; render(); }
function toggleAnswer() {   // A 누른 그 순간에만 현재 정답을 채운다
  const ans = document.getElementById("answer");
  if (ans.classList.contains("show")) {
    ans.classList.remove("show");
  } else {
    ans.textContent = SYMBOLS[deck[pos]].a;
    ans.classList.add("show");
  }
}

// ── 효과음 (Web Audio · 외부 파일 없이 합성) ─────────────────
let audioCtx = null, muted = false;
function unlockAudio() {  // 브라우저 자동재생 정책상 사용자 입력 후에만 소리 가능
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq, dur, type, vol) {
  if (muted || !audioCtx) return;
  const c = audioCtx, o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
  o.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime + dur);
}
// 기계식 시계 초침음: 짧은 노이즈 클릭을 밴드패스로 깎아 "짹/깍" 재현 (전자 삑 아님)
function clockClick(freq, vol) {
  if (muted || !audioCtx) return;
  const c = audioCtx, dur = 0.03, n = Math.floor(c.sampleRate * dur);
  const buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 3); // 급감쇠 노이즈
  const src = c.createBufferSource(); src.buffer = buf;
  const bp = c.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = freq; bp.Q.value = 6;
  const g = c.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(c.destination);
  src.start();
}
function playTick(idx) {                                          // 짹(고음)↔깍(저음) 교차, 후반 상승·증폭
  const hi = idx % 2 === 0;
  clockClick((hi ? 2400 : 1700) + idx * 40, Math.min(0.9, 0.5 + idx * 0.02));
}
function playBuzzer() {                                          // 삐!!!! (긴급 알람: 삑-삑-삐———)
  beep(950, 0.12, "square", 0.4);
  tickTimers.push(setTimeout(() => beep(950, 0.12, "square", 0.4), 150));
  tickTimers.push(setTimeout(() => { beep(950, 0.7, "sawtooth", 0.45); beep(1900, 0.7, "square", 0.2); }, 300));
}

// ── 3초 타이머 (긴급 모드) ───────────────────────────────────
const DURATION = 3.0;
function clearTimers() {
  clearInterval(timerId); timerId = null;
  tickTimers.forEach(clearTimeout); tickTimers = [];
}
function startTimer() {
  clearTimers();
  const bar = document.getElementById("timerBar");
  bar.classList.remove("timeout");
  bar.style.width = "100%";
  // 막대는 부드럽게 감소 (30ms 갱신)
  const t0 = performance.now();
  timerId = setInterval(() => {
    const left = Math.max(0, DURATION - (performance.now() - t0) / 1000);
    bar.style.width = (left / DURATION * 100) + "%";
    if (left <= 0) { clearInterval(timerId); timerId = null; }
  }, 30);
  // 째깍: 점점 빨라지고(가속) 점점 높아짐 → 시한폭탄 긴장감.
  // 간격은 0.34초에서 시작해 0.86배씩 줄되 0.08초로 하한 → 끝엔 최고속 등속(무한루프 방지)
  let t = 0, gap = 0.34, i = 0;
  while (t < DURATION - 0.02 && i < 200) {
    const at = t, idx = i;
    tickTimers.push(setTimeout(() => playTick(idx), at * 1000));               // 짹깍 가속
    t += gap; gap = Math.max(gap * 0.86, 0.08); i++;                           // 간격 축소(하한 0.08)
  }
  // 0초 → 삐!!!!
  tickTimers.push(setTimeout(() => {
    playBuzzer();
    bar.classList.add("timeout");
    document.body.classList.add("timeout-flash");
    setTimeout(() => document.body.classList.remove("timeout-flash"), 600);
  }, DURATION * 1000));
}
function toggleTimer() {
  timerOn = !timerOn;
  document.getElementById("timerWrap").classList.toggle("on", timerOn);
  updateMode();
  if (timerOn) startTimer(); else clearTimers();
}
function updateMode() {
  const parts = [];
  if (timerOn) parts.push("3초 타이머 ON");
  if (muted) parts.push("🔇 음소거");
  document.getElementById("mode").textContent = parts.join(" · ");
}

// ── 입력 ────────────────────────────────────────────────────
document.body.addEventListener("click", () => { unlockAudio(); next(); });
document.addEventListener("keydown", (e) => {
  unlockAudio();  // 첫 입력에서 오디오 잠금 해제
  switch (e.key) {
    case " ": case "ArrowRight": case "Enter": e.preventDefault(); next(); break;
    case "ArrowLeft": prev(); break;
    case "a": case "A": case "ㅁ": toggleAnswer(); break;
    case "s": case "S": case "ㄴ": shuffle(); render(); break;
    case "t": case "T": case "ㅅ": toggleTimer(); break;
    case "m": case "M": case "ㅡ": muted = !muted; updateMode(); break;
    case "f": case "F": case "ㄹ":
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
  }
});

shuffle();
render();
</script>
</body>
</html>
